name: Release Codefree-O

on:
  push:
    tags:
      - "codefree-o-v*"

permissions:
  contents: write

concurrency:
  group: release-codefree-o-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  verify-tag-branch:
    name: Verify tag source branch
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag commit belongs to feat/codefree-o
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feat/codefree-o --depth=1
          git branch -r --contains "$GITHUB_SHA" | grep -q "origin/feat/codefree-o"

      - name: Ensure tag version matches app version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#codefree-o-v}"
          PACKAGE_VERSION=$(grep -oP '"version":\s*"\K[^"]+' package.json | head -1)
          TAURI_VERSION=$(grep -oP '"version":\s*"\K[^"]+' src-tauri/tauri.conf.json | head -1)

          if [ -z "$PACKAGE_VERSION" ] || [ -z "$TAURI_VERSION" ]; then
            echo "Unable to read package or Tauri version" >&2
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi
          if [ "$TAG_VERSION" != "$TAURI_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match src-tauri/tauri.conf.json version $TAURI_VERSION" >&2
            exit 1
          fi

  release:
    name: Build Release
    needs: verify-tag-branch
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            artifact_name: windows
          - os: ubuntu-22.04
            artifact_name: linux
          - os: macos-14
            artifact_name: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            elfutils \
            xdg-utils
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Prepare Tauri signing key
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is missing" >&2
            exit 1
          fi

          RAW="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          KEY_PATH="$RUNNER_TEMP/tauri_signing.key"

          if echo "$RAW" | head -n1 | grep -q '^untrusted comment:'; then
            printf '%s\n' "$RAW" > "$KEY_PATH"
          else
            if DECODED=$(printf '%s' "$RAW" | (base64 --decode 2>/dev/null || base64 -D 2>/dev/null)) \
              && echo "$DECODED" | head -n1 | grep -q '^untrusted comment:'; then
              printf '%s\n' "$DECODED" > "$KEY_PATH"
            else
              if echo "$RAW" | grep -Eq '^[A-Za-z0-9+/=]+$'; then
                ONE=$(printf '%s' "$RAW" | tr -d '\r\n')
                printf '%s\n%s\n' "untrusted comment: tauri signing key" "$ONE" > "$KEY_PATH"
              else
                echo "Unrecognized TAURI_SIGNING_PRIVATE_KEY format" >&2
                exit 1
              fi
            fi
          fi

          if command -v base64 >/dev/null 2>&1; then
            KEY_B64=$(base64 < "$KEY_PATH" | tr -d '\r\n')
          elif command -v openssl >/dev/null 2>&1; then
            KEY_B64=$(openssl base64 -A -in "$KEY_PATH")
          else
            KEY_B64=$(KEY_PATH="$KEY_PATH" node -e "process.stdout.write(require('fs').readFileSync(process.env.KEY_PATH).toString('base64'))")
          fi

          if [ -z "$KEY_B64" ]; then
            echo "Unable to prepare TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi

          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_B64" >> "$GITHUB_ENV"
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi

      - name: Build Windows
        if: runner.os == 'Windows'
        run: pnpm tauri build

      - name: Build Linux
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Build macOS
        if: runner.os == 'macOS'
        run: pnpm tauri build --target universal-apple-darwin

      - name: Collect Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $Tag = $env:GITHUB_REF_NAME

          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) {
            $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($msi) {
            $dest = "CC-Switch-$Tag-Windows.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
            $sigPath = "$($msi.FullName).sig"
            if (Test-Path $sigPath) {
              Copy-Item $sigPath (Join-Path release-assets "$dest.sig")
            }
          } else {
            Write-Warning 'No Windows MSI installer found'
          }

          $exeCandidates = @(
            'src-tauri/target/release/cc-switch.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch.exe'
          )
          foreach ($exePath in $exeCandidates) {
            if (Test-Path $exePath) {
              $portableDir = 'release-assets/CC-Switch-Portable'
              New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
              Copy-Item $exePath (Join-Path $portableDir 'cc-switch.exe')
              @(
                '# CC Switch portable build marker',
                "Tag: $Tag",
                'This package is intended for portable internal distribution.'
              ) | Set-Content -Path (Join-Path $portableDir 'README.txt')

              $portableZip = "release-assets/CC-Switch-$Tag-Windows-Portable.zip"
              if (Test-Path $portableZip) {
                Remove-Item $portableZip -Force
              }
              Compress-Archive -Path "$portableDir\\*" -DestinationPath $portableZip -Force
              break
            }
          }

      - name: Collect Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          TAG="${GITHUB_REF_NAME}"
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            NEW_APPIMAGE="CC-Switch-${TAG}-Linux-x86_64.AppImage"
            cp "$APPIMAGE" "release-assets/$NEW_APPIMAGE"
            [ -f "$APPIMAGE.sig" ] && cp "$APPIMAGE.sig" "release-assets/$NEW_APPIMAGE.sig" || echo "No AppImage signature found"
          else
            echo "No AppImage found under target/release/bundle" >&2
          fi

          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release-assets/CC-Switch-${TAG}-Linux-x86_64.deb"
          fi

          RPM=$(find src-tauri/target/release/bundle -name "*.rpm" | head -1 || true)
          if [ -n "$RPM" ]; then
            cp "$RPM" "release-assets/CC-Switch-${TAG}-Linux-x86_64.rpm"
          fi

      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          TAG="${GITHUB_REF_NAME}"

          APP_PATH=""
          TAR_GZ=""

          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
              [ -z "$TAR_GZ" ] && TAR_GZ=$(find "$path" -maxdepth 1 -name "*.tar.gz" -type f | head -1 || true)
            fi
          done

          if [ -z "$APP_PATH" ]; then
            echo "No macOS .app bundle found" >&2
            exit 1
          fi
          if [ -z "$TAR_GZ" ]; then
            echo "No macOS .tar.gz updater artifact found" >&2
            exit 1
          fi

          NEW_TAR_GZ="CC-Switch-${TAG}-macOS.tar.gz"
          cp "$TAR_GZ" "release-assets/$NEW_TAR_GZ"
          [ -f "$TAR_GZ.sig" ] && cp "$TAR_GZ.sig" "release-assets/$NEW_TAR_GZ.sig" || echo "No macOS signature found for updater artifact"

          NEW_ZIP="CC-Switch-${TAG}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/$NEW_ZIP"

          HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg
          NEW_DMG="CC-Switch-${TAG}-macOS.dmg"
          DMG_STAGE_DIR="$RUNNER_TEMP/dmg-stage"
          rm -rf "$DMG_STAGE_DIR"
          mkdir -p "$DMG_STAGE_DIR"
          ditto "$APP_PATH" "$DMG_STAGE_DIR/CC Switch.app"

          create-dmg \
            --volname "CC Switch" \
            --background "src-tauri/icons/dmg-background.png" \
            --window-size 660 400 \
            --window-pos 200 120 \
            --icon-size 80 \
            --icon "CC Switch.app" 180 220 \
            --hide-extension "CC Switch.app" \
            --app-drop-link 480 220 \
            --no-internet-enable \
            "release-assets/$NEW_DMG" \
            "$DMG_STAGE_DIR"

          rm -rf "$DMG_STAGE_DIR"

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.artifact_name }}
          path: release-assets/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CC Switch Codefree-O ${{ github.ref_name }}
          prerelease: false
          body: |
            ## CC Switch Codefree-O ${{ github.ref_name }}

            Internal fork release for Windows, macOS, and Linux.

            ### Downloads

            - **macOS**: `CC-Switch-${{ github.ref_name }}-macOS.dmg` or `CC-Switch-${{ github.ref_name }}-macOS.zip`
            - **Windows**: `CC-Switch-${{ github.ref_name }}-Windows.msi` or `CC-Switch-${{ github.ref_name }}-Windows-Portable.zip`
            - **Linux (x86_64)**: `CC-Switch-${{ github.ref_name }}-Linux-x86_64.AppImage` / `.deb` / `.rpm`

            > `latest.json` and signed updater artifacts are published to this fork release feed.
            >
            > macOS build is intentionally unsigned and not notarized. Colleagues may need to open it once, then use `System Settings > Privacy & Security > Open Anyway`.
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assemble-latest-json:
    name: Assemble latest.json
    runs-on: ubuntu-22.04
    needs: publish-release
    permissions:
      contents: write
    steps:
      - name: Prepare GH
        run: |
          gh --version || (type -p curl >/dev/null && sudo apt-get update && sudo apt-get install -y gh || true)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY"
          ls -la dl || true

      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#codefree-o-v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"
          MAC_URL=""
          MAC_SIG=""
          WIN_URL=""
          WIN_SIG=""
          LINUX_URL=""
          LINUX_SIG=""

          shopt -s nullglob
          for sig in dl/*.sig; do
            base=${sig%.sig}
            fname=$(basename "$base")
            url="$BASE_URL/$fname"
            sig_content=$(cat "$sig")
            case "$fname" in
              *-macOS.tar.gz)
                MAC_URL="$url"
                MAC_SIG="$sig_content"
                ;;
              *-Windows.msi)
                WIN_URL="$url"
                WIN_SIG="$sig_content"
                ;;
              *-Linux-x86_64.AppImage)
                LINUX_URL="$url"
                LINUX_SIG="$sig_content"
                ;;
            esac
          done

          if [ -n "$MAC_URL" ] && [ -z "$MAC_SIG" ]; then
            echo "Missing signed macOS updater artifact signature" >&2
            exit 1
          fi
          if [ -z "$WIN_URL" ] || [ -z "$WIN_SIG" ]; then
            echo "Missing signed Windows updater artifact" >&2
            exit 1
          fi
          if [ -z "$LINUX_URL" ] || [ -z "$LINUX_SIG" ]; then
            echo "Missing signed Linux updater artifact" >&2
            exit 1
          fi

          tmp_json=$(mktemp)
          {
            echo '{'
            echo "  \"version\": \"$VERSION\","
            echo "  \"notes\": \"Release $TAG\","
            echo "  \"pub_date\": \"$PUB_DATE\","
            echo '  "platforms": {'
            first=1
            if [ -n "$MAC_URL" ] && [ -n "$MAC_SIG" ]; then
              for key in darwin-aarch64 darwin-x86_64; do
                if [ $first -eq 0 ]; then
                  echo ','
                fi
                echo "    \"$key\": {\"signature\": \"$MAC_SIG\", \"url\": \"$MAC_URL\"}"
                first=0
              done
            fi
            if [ $first -eq 0 ]; then
              echo ','
            fi
            echo "    \"windows-x86_64\": {\"signature\": \"$WIN_SIG\", \"url\": \"$WIN_URL\"},"
            echo "    \"linux-x86_64\": {\"signature\": \"$LINUX_SIG\", \"url\": \"$LINUX_URL\"}"
            echo '  }'
            echo '}'
          } > "$tmp_json"

          echo "Generated latest.json:" && cat "$tmp_json"
          mv "$tmp_json" latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber --repo "$GITHUB_REPOSITORY"
